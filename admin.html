<!-- LOGIN PAGE ADMIN -->
<div id="page-login" class="page active">
  <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-blue-800">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4">
          <i data-lucide="shield" class="w-8 h-8 text-white"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900">Admin Panel</h2>
        <p class="text-gray-500 text-sm">Masuk untuk mengelola portal alumni</p>
      </div>
      <form id="admin-login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="admin-username" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="admin">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="admin-password" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••">
        </div>
        <button type="submit" class="w-full py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 transition">Masuk ke Dashboard</button>
      </form>
      <p class="text-center text-xs text-gray-400 mt-4">Gunakan username: admin | password: admin</p>
    </div>
  </div>
</div>

<!-- MAIN ADMIN LAYOUT -->

  <aside class="w-64 bg-white border-r fixed h-full z-30">

      <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center"><i data-lucide="shield" class="w-5 h-5 text-white"></i></div>
      <span class="font-bold text-gray-900">Admin Panel</span>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <button onclick="navigateTo('dashboard')" id="nav-dashboard" class="sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 font-medium text-left"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</button>
      <button onclick="navigateTo('career')" id="nav-career" class="sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 font-medium text-left"><i data-lucide="briefcase" class="w-4 h-4"></i> Data Career</button>
      <button onclick="navigateTo('legalisir')" id="nav-legalisir" class="sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 font-medium text-left"><i data-lucide="stamp" class="w-4 h-4"></i> Legalisir</button>
    </nav>
    <div class="p-4 border-t">
      <button id="admin-logout-btn" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-red-600 hover:bg-red-50 transition"><i data-lucide="log-out" class="w-4 h-4"></i> Logout</button>
    </div>
  </aside>
  
  <!-- MAIN CONTENT -->
  <div class="flex-1 ml-64">
    <header class="sticky top-0 z-20 bg-white border-b px-6 py-4">

    </header>
    <main class="p-6">
      <div id="page-container"></div>
    </main>
  </div>

<!-- MODAL CRUD LOWONGAN -->
<div id="job-modal" class="modal">
  <div class="modal-content bg-white rounded-2xl max-w-2xl w-full mx-4">
    <div class="p-6">
      <div class="flex justify-between items-center mb-4">
        <h3 id="modal-title" class="text-xl font-bold text-gray-900">Tambah Lowongan</h3>
        <button onclick="closeJobModal()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-6 h-6"></i></button>
      </div>
      <form id="job-form" class="space-y-4">
        <input type="hidden" id="job-id">
        <div><label class="block text-sm font-medium mb-1">Judul Pekerjaan *</label><input type="text" id="job-title" class="w-full px-4 py-2 border rounded-lg" required></div>
        <div><label class="block text-sm font-medium mb-1">Perusahaan *</label><input type="text" id="job-company" class="w-full px-4 py-2 border rounded-lg" required></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium mb-1">Lokasi</label><input type="text" id="job-location" class="w-full px-4 py-2 border rounded-lg"></div>
          <div><label class="block text-sm font-medium mb-1">Tipe Pekerjaan</label><select id="job-type" class="w-full px-4 py-2 border rounded-lg"><option>Full-time</option><option>Remote</option><option>Hybrid</option><option>Part-time</option></select></div>
        </div>
        <div><label class="block text-sm font-medium mb-1">Gaji</label><input type="text" id="job-salary" class="w-full px-4 py-2 border rounded-lg" placeholder="Rp 8.000.000 - 15.000.000"></div>
        <div><label class="block text-sm font-medium mb-1">Status</label><select id="job-status" class="w-full px-4 py-2 border rounded-lg"><option value="Aktif">Aktif</option><option value="Tutup">Tutup</option></select></div>
        <div class="flex gap-3 pt-4">
          <button type="submit" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition">Simpan</button>
          <button type="button" onclick="closeJobModal()" class="flex-1 py-2 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition">Batal</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  // ==================== RENDER FUNCTIONS ====================
  
  function renderDashboard() {
    const stats = ADMIN_DATA.tracerStats;
    const alumni = ADMIN_DATA.alumniList;
    const bekerja = alumni.filter(a => a.workStatus === "Bekerja").length;
    const belumBekerja = alumni.filter(a => a.workStatus === "Belum Bekerja").length;
    const wirausaha = alumni.filter(a => a.workStatus === "Wirausaha").length;
    const melanjutkan = alumni.filter(a => a.workStatus === "Melanjutkan Studi").length;
    const belumMengisi = alumni.filter(a => a.tracerStatus === "Belum Mengisi").length;
    
    return `
      <div class="space-y-6">
        <!-- Welcome Card -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-700 rounded-2xl p-6 text-white">
          <h2 class="text-2xl font-bold">Selamat Datang, Admin!</h2>
          <p class="text-blue-100 mt-1">Berikut adalah ringkasan data tracer study alumni</p>
        </div>
        
        <!-- Stat Cards -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
          <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center"><i data-lucide="users" class="w-5 h-5 text-blue-600"></i></div><div><p class="text-xs text-gray-500">Total Alumni</p><p class="text-2xl font-bold">${stats.totalAlumni.toLocaleString()}</p></div></div></div>
          <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center"><i data-lucide="briefcase" class="w-5 h-5 text-green-600"></i></div><div><p class="text-xs text-gray-500">Sudah Bekerja</p><p class="text-2xl font-bold text-green-600">${bekerja}</p></div></div></div>
          <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-yellow-100 rounded-lg flex items-center justify-center"><i data-lucide="clock" class="w-5 h-5 text-yellow-600"></i></div><div><p class="text-xs text-gray-500">Belum Bekerja</p><p class="text-2xl font-bold text-yellow-600">${belumBekerja}</p></div></div></div>
          <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center"><i data-lucide="file-check" class="w-5 h-5 text-purple-600"></i></div><div><p class="text-xs text-gray-500">Sudah Isi Tracer</p><p class="text-2xl font-bold text-purple-600">${stats.totalAlumni - belumMengisi}</p></div></div></div>
          <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-red-100 rounded-lg flex items-center justify-center"><i data-lucide="alert-circle" class="w-5 h-5 text-red-600"></i></div><div><p class="text-xs text-gray-500">Belum Isi Tracer</p><p class="text-2xl font-bold text-red-600">${belumMengisi}</p></div></div></div>
        </div>
        
        <!-- Chart & Status Distribution -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="bg-white rounded-xl p-6 shadow-sm border">
            <h3 class="font-semibold text-gray-800 mb-4 flex items-center gap-2"><i data-lucide="pie-chart" class="w-5 h-5 text-blue-600"></i> Distribusi Status Pekerjaan</h3>
            <div class="space-y-3">
              <div><div class="flex justify-between text-sm mb-1"><span>Bekerja</span><span class="font-medium">${bekerja} Alumni</span></div><div class="w-full bg-gray-200 rounded-full h-3"><div class="bg-green-500 h-3 rounded-full" style="width: ${(bekerja/stats.totalAlumni)*100}%"></div></div></div>
              <div><div class="flex justify-between text-sm mb-1"><span>Belum Bekerja</span><span class="font-medium">${belumBekerja} Alumni</span></div><div class="w-full bg-gray-200 rounded-full h-3"><div class="bg-yellow-500 h-3 rounded-full" style="width: ${(belumBekerja/stats.totalAlumni)*100}%"></div></div></div>
              <div><div class="flex justify-between text-sm mb-1"><span>Wirausaha</span><span class="font-medium">${wirausaha} Alumni</span></div><div class="w-full bg-gray-200 rounded-full h-3"><div class="bg-purple-500 h-3 rounded-full" style="width: ${(wirausaha/stats.totalAlumni)*100}%"></div></div></div>
              <div><div class="flex justify-between text-sm mb-1"><span>Melanjutkan Studi</span><span class="font-medium">${melanjutkan} Alumni</span></div><div class="w-full bg-gray-200 rounded-full h-3"><div class="bg-blue-500 h-3 rounded-full" style="width: ${(melanjutkan/stats.totalAlumni)*100}%"></div></div></div>
            </div>
          </div>
          <div class="bg-white rounded-xl p-6 shadow-sm border">
            <h3 class="font-semibold text-gray-800 mb-4 flex items-center gap-2"><i data-lucide="file-text" class="w-5 h-5 text-blue-600"></i> Partisipasi Tracer Study</h3>
            <div class="text-center py-4"><div class="relative inline-flex"><svg class="w-40 h-40"><circle cx="80" cy="80" r="70" fill="none" stroke="#e5e7eb" stroke-width="12"/><circle cx="80" cy="80" r="70" fill="none" stroke="#2563eb" stroke-width="12" stroke-dasharray="440" stroke-dashoffset="${440 - (440 * (stats.totalAlumni - belumMengisi) / stats.totalAlumni)}" stroke-linecap="round" transform="rotate(-90 80 80)"/></svg><div class="absolute inset-0 flex flex-col items-center justify-center"><span class="text-3xl font-bold text-blue-600">${Math.round((stats.totalAlumni - belumMengisi) / stats.totalAlumni * 100)}%</span><span class="text-xs text-gray-500">Response Rate</span></div></div></div>
            <p class="text-center text-sm text-gray-500 mt-4">${stats.totalAlumni - belumMengisi} dari ${stats.totalAlumni} alumni telah mengisi tracer study</p>
          </div>
        </div>
        
        <!-- Recent Alumni List -->
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
          <div class="px-6 py-4 border-b flex justify-between items-center"><h3 class="font-semibold text-gray-800">Data Alumni Terbaru</h3><button class="text-sm text-blue-600">Lihat Semua</button></div>
          <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left">Nama</th><th class="px-4 py-3 text-left">NIM</th><th class="px-4 py-3 text-left">Program Studi</th><th class="px-4 py-3 text-left">Status Kerja</th><th class="px-4 py-3 text-left">Tracer</th></tr></thead><tbody>${alumni.slice(0,5).map(a => `<tr class="border-t hover:bg-gray-50"><td class="px-4 py-3 font-medium">${a.name}</td><td class="px-4 py-3 text-gray-600">${a.nim}</td><td class="px-4 py-3 text-gray-600">${a.studyProgram}</td><td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs ${a.workStatus === 'Bekerja' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${a.workStatus}</span></td><td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs ${a.tracerStatus === 'Sudah Mengisi' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${a.tracerStatus}</span></td></tr>`).join('')}</tbody></table></div>
        </div>
      </div>
    `;
  }
  
  function renderCareerPage() {
    const jobs = ADMIN_DATA.jobs;
    return `
      <div class="space-y-6">
        <div class="flex justify-between items-center"><h2 class="text-xl font-bold text-gray-800">Data Career Center</h2><button onclick="openJobModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 flex items-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i> Tambah Lowongan</button></div>
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left">Posisi</th><th class="px-4 py-3 text-left">Perusahaan</th><th class="px-4 py-3 text-left">Lokasi</th><th class="px-4 py-3 text-left">Tipe</th><th class="px-4 py-3 text-left">Gaji</th><th class="px-4 py-3 text-left">Status</th><th class="px-4 py-3 text-left">Pelamar</th><th class="px-4 py-3 text-center">Aksi</th></tr></thead><tbody>${jobs.map(job => `<tr class="border-t hover:bg-gray-50"><td class="px-4 py-3 font-medium">${job.title}</td><td class="px-4 py-3">${job.company}</td><td class="px-4 py-3">${job.location}</td><td class="px-4 py-3">${job.type}</td><td class="px-4 py-3 text-green-600">${job.salary}</td><td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs ${job.status === 'Aktif' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700'}">${job.status}</span></td><td class="px-4 py-3">${job.applicants}</td><td class="px-4 py-3 text-center"><button onclick="editJob(${job.id})" class="text-blue-600 hover:text-blue-800 mr-2"><i data-lucide="edit-2" class="w-4 h-4"></i></button><button onclick="deleteJob(${job.id})" class="text-red-600 hover:text-red-800"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td></tr>`).join('')}</tbody></table></div></div>
      </div>
    `;
  }
  
  function renderLegalisirPage() {
    const legalisir = ADMIN_DATA.legalisirList;
    const totalAmount = legalisir.reduce((sum, l) => sum + l.amount, 0);
    const pending = legalisir.filter(l => l.paymentStatus === "Pending").length;
    const completed = legalisir.filter(l => l.status === "Selesai").length;
    
    return `
      <div class="space-y-6">
        <h2 class="text-xl font-bold text-gray-800">Data Legalisir Ijazah & Transkrip</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center"><i data-lucide="file-text" class="w-5 h-5 text-blue-600"></i></div><div><p class="text-xs text-gray-500">Total Pengajuan</p><p class="text-2xl font-bold">${legalisir.length}</p></div></div></div>
          <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-yellow-100 rounded-lg flex items-center justify-center"><i data-lucide="clock" class="w-5 h-5 text-yellow-600"></i></div><div><p class="text-xs text-gray-500">Pending</p><p class="text-2xl font-bold text-yellow-600">${pending}</p></div></div></div>
          <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center"><i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i></div><div><p class="text-xs text-gray-500">Selesai</p><p class="text-2xl font-bold text-green-600">${completed}</p></div></div></div>
          <div class="bg-white rounded-xl p-5 shadow-sm border"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center"><i data-lucide="banknote" class="w-5 h-5 text-purple-600"></i></div><div><p class="text-xs text-gray-500">Total Pendapatan</p><p class="text-2xl font-bold text-purple-600">Rp ${totalAmount.toLocaleString()}</p></div></div></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left">Nama</th><th class="px-4 py-3 text-left">NIM</th><th class="px-4 py-3 text-left">Dokumen</th><th class="px-4 py-3 text-center">Jml</th><th class="px-4 py-3 text-left">Tgl Pengajuan</th><th class="px-4 py-3 text-left">Status</th><th class="px-4 py-3 text-left">Pembayaran</th><th class="px-4 py-3 text-right">Biaya</th><th class="px-4 py-3 text-center">Aksi</th></tr></thead><tbody>${legalisir.map(l => `<tr class="border-t hover:bg-gray-50"><td class="px-4 py-3 font-medium">${l.name}</td><td class="px-4 py-3">${l.nim}</td><td class="px-4 py-3">${l.documentType}</td><td class="px-4 py-3 text-center">${l.quantity}</td><td class="px-4 py-3">${l.submitDate}</td><td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs ${l.status === 'Selesai' ? 'bg-green-100 text-green-700' : l.status === 'Proses' ? 'bg-blue-100 text-blue-700' : 'bg-yellow-100 text-yellow-700'}">${l.status}</span></td><td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs ${l.paymentStatus === 'Lunas' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${l.paymentStatus}</span></td><td class="px-4 py-3 text-right">Rp ${l.amount.toLocaleString()}</td><td class="px-4 py-3 text-center"><button onclick="updateLegalisirStatus(${l.id})" class="text-blue-600 hover:text-blue-800 text-xs">Update Status</button></td></tr>`).join('')}</tbody></table></div></div>
      </div>
    `;
  }
  
  // ==================== CRUD FUNCTIONS ====================
  function openJobModal(job = null) {
    if(job) {
      document.getElementById('modal-title').innerText = 'Edit Lowongan';
      document.getElementById('job-id').value = job.id;
      document.getElementById('job-title').value = job.title;
      document.getElementById('job-company').value = job.company;
      document.getElementById('job-location').value = job.location;
      document.getElementById('job-type').value = job.type;
      document.getElementById('job-salary').value = job.salary;
      document.getElementById('job-status').value = job.status;
      editingJobId = job.id;
    } else {
      document.getElementById('modal-title').innerText = 'Tambah Lowongan';
      document.getElementById('job-form').reset();
      document.getElementById('job-id').value = '';
      editingJobId = null;
    }
    document.getElementById('job-modal').classList.add('show');
    if(typeof lucide !== 'undefined') lucide.createIcons();
  }
  
  function editJob(id) { const job = ADMIN_DATA.jobs.find(j => j.id === id); if(job) openJobModal(job); }
  
  function deleteJob(id) { if(confirm('Hapus lowongan ini?')) { ADMIN_DATA.jobs = ADMIN_DATA.jobs.filter(j => j.id !== id); renderCareerPage(); renderPage('career'); if(typeof lucide !== 'undefined') lucide.createIcons(); } }
  
  function closeJobModal() { document.getElementById('job-modal').classList.remove('show'); }
  
  function updateLegalisirStatus(id) { alert(`Status pengajuan legalisir ID ${id} dapat diubah di sini.`); }
  
  // ==================== NAVIGATION ====================
  function renderPage(page) {
    const container = document.getElementById('page-container');
    if(!container) return;
    if(page === 'dashboard') container.innerHTML = renderDashboard();
    else if(page === 'career') container.innerHTML = renderCareerPage();
    else if(page === 'legalisir') container.innerHTML = renderLegalisirPage();
    if(typeof lucide !== 'undefined') lucide.createIcons();
  }
  
  function navigateTo(page) {
    currentPage = page;
    renderPage(page);
    document.getElementById('page-title').innerText = page === 'dashboard' ? 'Dashboard Admin' : page === 'career' ? 'Data Career Center' : 'Data Legalisir';
    document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`nav-${page}`).classList.add('active');
  }
  
  // ==================== EVENT LISTENERS ====================
  document.getElementById('admin-login-form')?.addEventListener('submit', (e) => {
    e.preventDefault();
    const username = document.getElementById('admin-username').value;
    const password = document.getElementById('admin-password').value;
    if(username === 'admin' && password === 'admin') {
      document.getElementById('page-login').classList.remove('active');
      document.getElementById('admin-layout').classList.remove('hidden');
      navigateTo('dashboard');
    } else alert('Username atau password salah!');
  });
  
  document.getElementById('admin-logout-btn')?.addEventListener('click', () => {
    document.getElementById('admin-layout').classList.add('hidden');
    document.getElementById('page-login').classList.add('active');
    document.getElementById('admin-login-form').reset();
  });
  
  document.getElementById('job-form')?.addEventListener('submit', (e) => {
    e.preventDefault();
    const newJob = { id: editingJobId || Date.now(), title: document.getElementById('job-title').value, company: document.getElementById('job-company').value, location: document.getElementById('job-location').value, type: document.getElementById('job-type').value, salary: document.getElementById('job-salary').value, status: document.getElementById('job-status').value, applicants: 0, posted: new Date().toISOString().slice(0,10) };
    if(editingJobId) { const index = ADMIN_DATA.jobs.findIndex(j => j.id === editingJobId); if(index !== -1) ADMIN_DATA.jobs[index] = newJob; }
    else ADMIN_DATA.jobs.unshift(newJob);
    closeJobModal();
    renderPage('career');
    if(typeof lucide !== 'undefined') lucide.createIcons();
    alert('Data lowongan berhasil disimpan!');
  });
  
  window.onclick = (event) => { const modal = document.getElementById('job-modal'); if(event.target === modal) modal.classList.remove('show'); };
  window.openJobModal = openJobModal;
  window.editJob = editJob;
  window.deleteJob = deleteJob;
  window.closeJobModal = closeJobModal;
  window.updateLegalisirStatus = updateLegalisirStatus;
  window.navigateTo = navigateTo;
  
  window.onload = () => { if(typeof lucide !== 'undefined') lucide.createIcons(); };
</script>
</body>
</html>
