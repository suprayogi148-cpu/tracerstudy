<script>
  let currentStep = 1;
  const totalSteps = 5;
  
  function updateStepUI() {
    for(let i=1; i<=totalSteps; i++) {
      const stepDiv = document.getElementById(`step-${i}`);
      if(stepDiv) stepDiv.classList.toggle('active-step', i === currentStep);
      const indicator = document.querySelector(`.step-indicator[data-step="${i}"]`);
      if(indicator) {
        const circle = indicator.querySelector('span');
        if(i < currentStep) { circle.classList.remove('bg-gray-300', 'bg-blue-600'); circle.classList.add('bg-green-600'); circle.innerText = '✓'; }
        else if(i === currentStep) { circle.classList.remove('bg-gray-300', 'bg-green-600'); circle.classList.add('bg-blue-600'); circle.innerText = i; }
        else { circle.classList.remove('bg-blue-600', 'bg-green-600'); circle.classList.add('bg-gray-300'); circle.innerText = i; }
      }
    }
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const submitBtn = document.getElementById('submit-btn');
    if(currentStep === 1) prevBtn.classList.add('hidden');
    else prevBtn.classList.remove('hidden');
    if(currentStep === totalSteps) { nextBtn.classList.add('hidden'); submitBtn.classList.remove('hidden'); }
    else { nextBtn.classList.remove('hidden'); submitBtn.classList.add('hidden'); }
  }
  
  function nextStep() { if(currentStep < totalSteps) { currentStep++; updateStepUI(); window.scrollTo(0,0); } }
  function prevStep() { if(currentStep > 1) { currentStep--; updateStepUI(); window.scrollTo(0,0); } }
  
  document.getElementById('organisasi')?.addEventListener('change', (e) => {
    document.getElementById('alasan_tidak_organisasi_container').classList.toggle('hidden', e.target.value !== 'Tidak');
  });
  document.getElementById('sudah_bekerja')?.addEventListener('change', (e) => {
    document.getElementById('alasan_tidak_bekerja_container').classList.toggle('hidden', e.target.value !== 'Tidak');
  });
  
  document.getElementById('prev-btn')?.addEventListener('click', prevStep);
  document.getElementById('next-btn')?.addEventListener('click', nextStep);
  
  // SUBMIT TRACER - LANGSUNG KE DASHBOARD
  const tracerForm = document.getElementById('tracer-multistep-form');
  if(tracerForm) {
    tracerForm.addEventListener('submit', function(e) {
      e.preventDefault();
      e.stopPropagation();
      
      const formData = new FormData(tracerForm);
      for(let [key,value] of formData.entries()) {
        if(value) APP_DATA.tracerData[key] = value;
      }
      
      if(document.getElementById('sudah_bekerja')?.value === 'Ya') {
        APP_DATA.currentUser.jobStatus = 'Bekerja';
      } else if(document.getElementById('sudah_bekerja')?.value === 'Tidak') {
        APP_DATA.currentUser.jobStatus = 'Tidak Bekerja';
      }
      if(document.getElementById('perusahaan_sekarang')?.value) {
        APP_DATA.currentUser.company = document.getElementById('perusahaan_sekarang').value;
      }
      if(document.getElementById('jabatan_sekarang')?.value) {
        APP_DATA.currentUser.position = document.getElementById('jabatan_sekarang').value;
      }
      APP_DATA.currentUser.completion = 100;
      
      alert('Terima kasih! Data tracer study berhasil disimpan.');
      
      document.getElementById('page-tracer-after-login').classList.remove('active');
      document.getElementById('app-layout').classList.remove('hidden');
      
      document.getElementById('nav-username').innerText = APP_DATA.currentUser.name;
      document.getElementById('nav-avatar').src = APP_DATA.currentUser.avatar;
      
      renderSidebar();
      renderPage('dashboard');
      navigateTo('dashboard');
      
      return false;
    });
  }

          </div>
        </div>
      </div>
    `;
  }
  
  // Filter functions
  let currentCategory = "Semua";
  let currentSearch = "";
  
  window.filterJobsByCategory = function(category) {
    currentCategory = category;
    applyFilters();
    // Update active button style
    document.querySelectorAll('.category-filter').forEach(btn => {
      btn.classList.remove('bg-blue-600', 'text-white');
      btn.classList.add('bg-gray-100', 'text-gray-600');
      if(btn.innerText === category) {
        btn.classList.remove('bg-gray-100', 'text-gray-600');
        btn.classList.add('bg-blue-600', 'text-white');
      }
    });
  };
  
  window.filterJobsBySearch = function(search) {
    currentSearch = search;
    applyFilters();
  };
  
  function applyFilters() {
    let filtered = APP_DATA.jobs;
    if(currentCategory !== "Semua") {
      filtered = filtered.filter(job => job.type === currentCategory || job.badge === currentCategory);
    }
    if(currentSearch) {
      filtered = filtered.filter(job => job.title.toLowerCase().includes(currentSearch.toLowerCase()) || job.company.toLowerCase().includes(currentSearch.toLowerCase()));
    }
    const container = document.getElementById('job-listings');
    if(container) {
      container.innerHTML = filtered.map(job => renderJobCard(job)).join('');
      if(typeof lucide !== 'undefined') lucide.createIcons();
    }
  }
  
  // Show job detail modal

    modalBody.innerHTML = `

            <span class="flex items-center gap-1 text-sm bg-gray-100 px-3 py-1.5 rounded-full"><i data-lucide="clock" class="w-4 h-4"></i> ${job.posted}</span>
            <span class="flex items-center gap-1 text-sm bg-green-100 text-green-700 px-3 py-1.5 rounded-full"><i data-lucide="banknote" class="w-4 h-4"></i> ${job.salary}</span>

          <div class="mb-6"><h3 class="font-semibold text-gray-800 mb-2 flex items-center gap-2"><i data-lucide="file-text" class="w-5 h-5 text-blue-600"></i> Deskripsi Pekerjaan</h3><p class="text-gray-600">${job.description}</p></div>
          
          <div class="mb-6"><h3 class="font-semibold text-gray-800 mb-2 flex items-center gap-2"><i data-lucide="check-circle" class="w-5 h-5 text-blue-600"></i> Requirements</h3><ul class="list-disc pl-5 space-y-1 text-gray-600">${job.requirements.map(req => `<li>${req}</li>`).join('')}</ul></div>
          
          <div class="mb-6"><h3 class="font-semibold text-gray-800 mb-2 flex items-center gap-2"><i data-lucide="target" class="w-5 h-5 text-blue-600"></i> Responsibilities</h3><ul class="list-disc pl-5 space-y-1 text-gray-600">${job.responsibilities.map(res => `<li>${res}</li>`).join('')}</ul></div>
          
          <div class="mb-6"><h3 class="font-semibold text-gray-800 mb-2 flex items-center gap-2"><i data-lucide="gift" class="w-5 h-5 text-blue-600"></i> Benefits</h3><div class="flex flex-wrap gap-2">${job.benefits.map(ben => `<span class="px-3 py-1 bg-green-50 text-green-700 rounded-full text-sm">${ben}</span>`).join('')}</div></div>
          
          <div class="flex gap-3 pt-4 border-t"><button onclick="applyJob(${job.id})" class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition"><i data-lucide="send" class="w-4 h-4 inline mr-2"></i> Lamar Sekarang</button><button onclick="closeModal()" class="px-6 py-3 border border-gray-300 text-gray-600 rounded-xl font-medium hover:bg-gray-50 transition">Tutup</button></div>
        </div>
      </div>
    `;
    document.getElementById('job-modal').classList.add('show');
    if(typeof lucide !== 'undefined') lucide.createIcons();
  };
  
  window.closeModal = function() {
    document.getElementById('job-modal').classList.remove('show');

  window.applyJob = function(jobId) {
    const job = APP_DATA.jobs.find(j => j.id === jobId);
    alert(`Lamaran Anda untuk posisi "${job.title}" di ${job.company} telah terkirim! Tim HR akan menghubungi Anda dalam 3-5 hari kerja.`);
    closeModal();

    // Get updated values from inputs if available
    const name = document.getElementById('cv-name')?.value || cv.personal.fullName;
    const title = document.getElementById('cv-title')?.value || cv.personal.jobTitle;
    const email = document.getElementById('cv-email')?.value || cv.personal.email;
    const phone = document.getElementById('cv-phone')?.value || cv.personal.phone;
    
    const colorClass = tpl === 'professional' ? 'blue' : tpl === 'modern' ? 'purple' : tpl === 'minimal' ? 'green' : 'red';
    const bgGradient = tpl === 'professional' ? 'from-blue-600 to-blue-700' : tpl === 'modern' ? 'from-purple-600 to-indigo-700' : tpl === 'minimal' ? 'from-green-600 to-emerald-700' : 'from-red-600 to-rose-700';
    
    return `
      <div class="p-6 font-sans">
        <!-- Header -->
        <div class="bg-gradient-to-r ${bgGradient} -mx-6 -mt-6 px-6 py-6 mb-6 text-white">
          <h1 class="text-2xl font-bold">${name}</h1>
          <p class="text-white/90 text-sm mt-1">${title}</p>
        </div>
        
        <!-- Konten CV -->
        <div class="space-y-4">
          <!-- Contact -->
          <div class="flex flex-wrap gap-3 text-xs text-gray-500 border-b pb-3">
            <span class="flex items-center gap-1"><i data-lucide="mail" class="w-3 h-3"></i> ${email}</span>
            <span class="flex items-center gap-1"><i data-lucide="phone" class="w-3 h-3"></i> ${phone}</span>
            <span class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ${cv.personal.location}</span>
            <span class="flex items-center gap-1"><i data-lucide="linkedin" class="w-3 h-3"></i> ${cv.personal.linkedin}</span>
          </div>
          
          <!-- Summary -->
          <div><h3 class="text-sm font-bold text-${colorClass}-600 uppercase tracking-wider mb-2 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4"></i> Profil</h3><p class="text-xs text-gray-600 leading-relaxed">${cv.summary}</p></div>
          
          <!-- Experience -->
          <div><h3 class="text-sm font-bold text-${colorClass}-600 uppercase tracking-wider mb-2 flex items-center gap-2"><i data-lucide="briefcase" class="w-4 h-4"></i> Pengalaman Kerja</h3><div class="space-y-3">${cv.experience.map(exp => `<div><p class="font-semibold text-sm text-gray-800">${exp.position} • ${exp.company}</p><p class="text-xs text-gray-500">${exp.period} | ${exp.location}</p><p class="text-xs text-gray-600 mt-1">${exp.description}</p></div>`).join('')}</div></div>
          
          <!-- Education -->
          <div><h3 class="text-sm font-bold text-${colorClass}-600 uppercase tracking-wider mb-2 flex items-center gap-2"><i data-lucide="graduation-cap" class="w-4 h-4"></i> Pendidikan</h3>${cv.education.map(edu => `<div><p class="font-semibold text-sm text-gray-800">${edu.degree}</p><p class="text-xs text-gray-500">${edu.institution} | ${edu.year}</p><p class="text-xs text-gray-600">IPK: ${edu.gpa}</p></div>`).join('')}</div>
          
          <!-- Skills -->
          <div><h3 class="text-sm font-bold text-${colorClass}-600 uppercase tracking-wider mb-2 flex items-center gap-2"><i data-lucide="code-2" class="w-4 h-4"></i> Keahlian</h3><div class="flex flex-wrap gap-1.5">${cv.skills.map(skill => `<span class="px-2 py-1 bg-gray-100 text-gray-700 rounded text-xs">${skill}</span>`).join('')}</div></div>
        </div>
      </div>
    `;
  }
  
  function updateCVPreview() {
    const container = document.getElementById('cv-preview-container');
    if(container) {
      container.innerHTML = renderCVPreview();
      if(typeof lucide !== 'undefined') lucide.createIcons();
    }
    updateATSScore();
  }
  
  function selectTemplate(templateId) {
    selectedTemplate = templateId;
    document.querySelectorAll('.cv-template-card').forEach(card => {
      card.classList.remove('active', 'border-blue-500', 'bg-blue-50');
      card.classList.add('border-gray-200');
    });
    const selectedCard = document.getElementById(`template-${templateId}`);
    if(selectedCard) {
      selectedCard.classList.remove('border-gray-200');
      selectedCard.classList.add('active', 'border-blue-500', 'bg-blue-50');
    }
    updateCVPreview();
  }
  
  function updateATSScore() {
    const cv = APP_DATA.cvData;
    let score = 85;
    if(cv.skills.length >= 8) score += 5;
    if(cv.summary.length > 100) score += 3;
    if(cv.experience.length >= 2) score += 4;
    if(cv.certifications.length >= 1) score += 3;
    score = Math.min(score, 99);
    document.getElementById('ats-score-value')?.setAttribute('data-value', score);
    const scoreSpan = document.getElementById('ats-score-value');
    if(scoreSpan) scoreSpan.innerText = score;
    const progressBar = document.querySelector('.ats-score');
    if(progressBar) progressBar.style.width = `${score}%`;
  }
  
  function showFullCVPreview() {
    const modalBody = document.getElementById('cv-modal-body');
    modalBody.innerHTML = `
      <div class="relative">
        <button onclick="closeCVModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 z-10 bg-white rounded-full p-1"><i data-lucide="x" class="w-6 h-6"></i></button>
        <div class="p-6 max-h-[85vh] overflow-y-auto">
          ${renderCVPreview()}
          <div class="mt-6 pt-4 border-t flex gap-3">
            <button onclick="downloadCV('pdf')" class="flex-1 py-2 bg-green-600 text-white rounded-lg font-medium hover:bg-green-700 transition flex items-center justify-center gap-2"><i data-lucide="file-text" class="w-4 h-4"></i> Download PDF</button>
            <button onclick="closeCVModal()" class="px-6 py-2 border border-gray-300 text-gray-600 rounded-lg font-medium hover:bg-gray-50 transition">Tutup</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('cv-preview-modal').classList.add('show');
    if(typeof lucide !== 'undefined') lucide.createIcons();
  }
  
  function closeCVModal() {
    document.getElementById('cv-preview-modal').classList.remove('show');
  }
  
  function downloadCV(format) {
    alert(`CV berhasil diunduh dalam format ${format.toUpperCase()}! File CV ATS-Friendly sudah siap.`);
  }
  
  function attachCVEventListeners() {
    const inputs = ['cv-name', 'cv-title', 'cv-email', 'cv-phone'];
    inputs.forEach(id => {
      const el = document.getElementById(id);
      if(el) el.addEventListener('input', updateCVPreview);
    });
  }
  
  window.selectTemplate = selectTemplate;
  window.updateCVPreview = updateCVPreview;
  window.showFullCVPreview = showFullCVPreview;
  window.closeCVModal = closeCVModal;
  window.downloadCV = downloadCV;
  
  window.showProfileTab = showProfileTab;
  
  function renderSidebar() {
    const sidebarNav = document.getElementById('sidebar-nav');
    if(!sidebarNav) return;
    sidebarNav.innerHTML = '';
    APP_DATA.menuItems.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 font-medium text-left';
      btn.dataset.page = item.id;
      btn.innerHTML = `<i data-lucide="${item.icon}" class="w-4 h-4"></i> ${item.label}`;
      btn.onclick = () => navigateTo(item.id);
      sidebarNav.appendChild(btn);
    });
    if(typeof lucide !== 'undefined') lucide.createIcons();
  }
  
  function renderPage(pageId) {
    const container = document.getElementById('page-container');
    if(!container) return;
    if(pageId === 'dashboard') {
      container.innerHTML = `<div class="bg-gradient-to-r from-blue-600 to-blue-700 rounded-2xl p-6 mb-6 text-white"><h3 class="text-xl font-bold">Halo, ${APP_DATA.currentUser.name}!</h3><p class="text-blue-100">Selamat datang di portal karir alumni. Terima kasih telah mengisi tracer study.</p></div><div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">${['Status Kerja', 'Lowongan', 'Legalisir', 'Profil'].map((label,i) => `<div class="bg-white rounded-xl p-4 shadow-sm"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center"><i data-lucide="${['file-check','briefcase','file-text','user-check'][i]}" class="w-5 h-5 text-blue-600"></i></div><div><p class="text-xs text-gray-500">${label}</p><p class="font-bold text-gray-900">${i===0?APP_DATA.currentUser.jobStatus:i===1?APP_DATA.jobs.length+' Lowongan':i===2?'Ajukan':'Lengkap'}</p></div></div></div>`).join('')}</div><div class="bg-white rounded-xl p-5 shadow-sm"><h4 class="font-semibold text-gray-800 mb-4">Lowongan Terbaru</h4><div class="space-y-3">${APP_DATA.jobs.map(job => `<div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg"><div><p class="font-medium text-gray-800">${job.title}</p><p class="text-xs text-gray-500">${job.company} • ${job.location}</p></div><span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">${job.badge}</span></div>`).join('')}</div></div>`;
    } else if(pageId === 'profile') {
      container.innerHTML = renderProfilePage();
      setTimeout(() => { if(typeof lucide !== 'undefined') lucide.createIcons(); }, 50);
    } else if(pageId === 'career') {
      container.innerHTML = renderCareerCenter();
      setTimeout(() => { 
        if(typeof lucide !== 'undefined') lucide.createIcons(); 
        // Setup search functionality
        const searchInput = document.getElementById('search-jobs');
        if(searchInput) {
          searchInput.addEventListener('input', function() {
            filterJobsBySearch(this.value);
          });
        }
      }, 50);
        } else if(pageId === 'cv') {
      container.innerHTML = renderCVGenerator();
      setTimeout(() => { 
        if(typeof lucide !== 'undefined') lucide.createIcons();
        attachCVEventListeners();
      }, 50);
    } else if(pageId === 'legalisir') {
      container.innerHTML = `<div class="bg-white rounded-xl p-6 shadow-sm"><h3 class="font-bold text-xl mb-4">Legalisir Online</h3><form onsubmit="alert('Pengajuan legalisir diterima! Silakan cek status secara berkala.'); return false;"><div class="mb-4"><label class="block text-sm font-medium mb-1">Jenis Dokumen</label><select class="w-full px-4 py-2 border rounded-lg"><option>Ijazah</option><option>Transkrip Nilai</option><option>Surat Keterangan Lulus</option></select></div><div class="mb-4"><label class="block text-sm font-medium mb-1">Jumlah Lembar</label><input type="number" value="2" min="1" class="w-full px-4 py-2 border rounded-lg"></div><div class="mb-4 border-2 border-dashed border-gray-200 rounded-lg p-6 text-center cursor-pointer hover:border-blue-300 transition" id="uploadArea"><i data-lucide="upload-cloud" class="w-8 h-8 text-gray-400 mx-auto mb-2"></i><p class="text-sm text-gray-500">Klik untuk upload file (PDF/JPG, max 5MB)</p></div><button type="submit" class="px-6 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">Ajukan Legalisir</button></form></div>`;
    }
    if(typeof lucide !== 'undefined') lucide.createIcons();
    document.getElementById('uploadArea')?.addEventListener('click', () => alert('Simulasi upload file'));
  }
  
  function navigateTo(pageId) {
    renderPage(pageId);
    const titles = { dashboard:'Dashboard', profile:'Profile Saya', career:'Career Center', cv:'CV Generator', legalisir:'Legalisir' };
    document.getElementById('page-title-nav').innerText = titles[pageId] || 'Dashboard';
    document.querySelectorAll('.sidebar-item').forEach(btn => {
      btn.classList.remove('active');
      if(btn.dataset.page === pageId) btn.classList.add('active');
    });
    document.getElementById('dropdown-menu')?.classList.remove('show');
    if(pageId === 'profile') setTimeout(() => showProfileTab('personal'), 100);
  }
  
  function initDropdown() {
    const profileBtn = document.getElementById('profile-btn');
    const dropdown = document.getElementById('dropdown-menu');
    if(profileBtn) {
      profileBtn.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('show'); });
      document.addEventListener('click', () => dropdown.classList.remove('show'));
    }
  }
  
  document.getElementById('login-form')?.addEventListener('submit', (e) => {
    e.preventDefault();
    document.getElementById('page-login').classList.remove('active');
    document.getElementById('page-tracer-after-login').classList.add('active');
    currentStep = 1;
    updateStepUI();
  });
  
  document.getElementById('logout-btn')?.addEventListener('click', () => {
    document.getElementById('app-layout').classList.add('hidden');
    document.getElementById('page-login').classList.add('active');
  });
  
  function applyTexts() {
    document.getElementById('login-hero-title') && (document.getElementById('login-hero-title').innerText = "ALUMETRA");
    document.getElementById('login-hero-subtitle') && (document.getElementById('login-hero-subtitle').innerText = "(Alumni Metric)");
    document.getElementById('login-title') && (document.getElementById('login-title').innerText = "Selamat Datang Kembali");
    document.getElementById('login-subtitle') && (document.getElementById('login-subtitle').innerText = "Masuk untuk mengakses portal alumni");
    document.getElementById('login-email-label') && (document.getElementById('login-email-label').innerText = "Alamat Email");
    document.getElementById('login-password-label') && (document.getElementById('login-password-label').innerText = "Kata Sandi");
    document.getElementById('login-forgot') && (document.getElementById('login-forgot').innerText = "Lupa kata sandi?");
    document.getElementById('login-button') && (document.getElementById('login-button').innerText = "Masuk");
    document.getElementById('remember-label') && (document.getElementById('remember-label').innerText = "Ingat saya");
    document.getElementById('sidebar-brand') && (document.getElementById('sidebar-brand').innerText = "ALUMETRA");
  }
  
  window.onload = () => { applyTexts(); renderSidebar(); initDropdown(); updateStepUI();     // Close modal when clicking outside
    window.onclick = function(event) {
      const modal = document.getElementById('job-modal');
      const cvModal = document.getElementById('cv-preview-modal');
      if(event.target === modal) modal.classList.remove('show');
      if(event.target === cvModal) cvModal.classList.remove('show');
    }; };
</script>
</body>
</html>
